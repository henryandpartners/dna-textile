name: DNA Textile Tests

on:
  push:
    branches: [main, develop]
    paths: ['dna-textile/**']
  pull_request:
    branches: [main, develop]
    paths: ['dna-textile/**']

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('dna-textile/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          cd dna-textile
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-xdist pytest-benchmark

      - name: Run unit tests
        run: |
          cd dna-textile
          pytest tests/test_dna_parser.py tests/test_color_palette.py tests/test_complexity.py tests/test_border_style.py tests/test_motif_library.py tests/test_sensitivity_checker.py -v --tb=short

      - name: Run pattern generation tests
        run: |
          cd dna-textile
          pytest tests/test_pattern_generator.py -v --tb=short -m pattern

      - name: Run cultural rule tests
        run: |
          cd dna-textile
          pytest tests/test_cultural_rules.py -v --tb=short -m cultural

      - name: Run export format tests
        run: |
          cd dna-textile
          pytest tests/test_exporters.py -v --tb=short -m export

      - name: Run DNA mixing tests
        run: |
          cd dna-textile
          pytest tests/test_mixer.py -v --tb=short -m mix

      - name: Run all tests with coverage
        run: |
          cd dna-textile
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: dna-textile/coverage.xml
          flags: dna-textile
          name: dna-textile-coverage

  benchmark:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd dna-textile
          pip install -r requirements.txt
          pip install pytest pytest-benchmark

      - name: Run benchmarks
        run: |
          cd dna-textile
          pytest tests/ --benchmark-json=benchmark.json -v

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: dna-textile-benchmarks
          path: dna-textile/benchmark.json
