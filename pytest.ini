[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=90
    --benchmark-json=benchmark.json
markers =
    unit: Unit tests
    pattern: Pattern generation tests
    cultural: Cultural rule validation tests
    export: Export format tests
    mix: DNA mixing tests
    slow: Slow-running tests
